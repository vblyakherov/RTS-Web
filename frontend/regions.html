<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTKS Tracker — Регионы</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1100;margin-top:60px;"></div>

<div class="page-content">

    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <h5 class="mb-0 fw-bold"><i class="bi bi-geo-alt me-2"></i>Справочник регионов</h5>
        <button class="btn btn-primary btn-sm" id="btnAdd" onclick="openCreateModal()">
            <i class="bi bi-plus-lg me-1"></i>Добавить регион
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">Название</th>
                            <th>Статус</th>
                            <th>Создан</th>
                            <th style="width:80px;"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="4" class="text-center py-5">
                            <div class="spinner-border text-primary"></div>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- ===== Модал создания/редактирования ===== -->
<div class="modal fade" id="itemModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Новый регион</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="itemForm" novalidate>
                    <input type="hidden" id="editItemId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="f_name" required placeholder="Например: Москва, Санкт-Петербург...">
                    </div>
                    <div class="form-check" id="activeField" style="display:none;">
                        <input class="form-check-input" type="checkbox" id="f_is_active">
                        <label class="form-check-label" for="f_is_active">Активен</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="submitForm()">
                    <i class="bi bi-check-lg me-1"></i><span id="modalSaveTxt">Создать</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Подтверждение удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title text-danger">
                    <i class="bi bi-geo-alt me-2"></i>Удалить регион?
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Регион <strong id="deleteTargetName"></strong> будет удалён.
                Объекты, привязанные к этому региону, останутся, но поле «Регион» у них будет сброшено.
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">
                    <i class="bi bi-trash me-1"></i>Удалить
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
let currentUser  = null;
let isEditMode   = false;
let deleteItemId = null;

async function init() {
    currentUser = await checkAuth();
    if (!currentUser) return;

    if (currentUser.role !== 'admin') {
        // manager может просматривать, но не редактировать
        if (!['admin', 'manager'].includes(currentUser.role)) {
            window.location.href = '/index.html';
            return;
        }
        document.getElementById('btnAdd').classList.add('d-none');
    }

    mountNavbar(currentUser, 'regions');
    loadItems();
}

async function loadItems() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5">
        <div class="spinner-border spinner-border-sm text-primary"></div></td></tr>`;
    try {
        const items = await api.getRegions(true);
        renderTable(items);
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-4">
            <i class="bi bi-exclamation-triangle me-2"></i>${err.message}</td></tr>`;
    }
}

function renderTable(items) {
    const tbody = document.getElementById('tableBody');
    const isAdmin = currentUser.role === 'admin';

    if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-5">
            <i class="bi bi-geo-alt display-6 d-block mb-2"></i>Регионы не найдены</td></tr>`;
        return;
    }
    tbody.innerHTML = items.map(r => `
        <tr>
            <td class="ps-3 fw-semibold">${escHtml(r.name)}</td>
            <td>
                ${r.is_active
                    ? '<span class="badge bg-success-subtle text-success border border-success-subtle">Активен</span>'
                    : '<span class="badge bg-secondary-subtle text-secondary border">Неактивен</span>'}
            </td>
            <td class="text-muted small">${formatDate(r.created_at)}</td>
            <td>
                ${isAdmin ? `
                <button class="btn btn-sm btn-outline-secondary py-0 px-1 me-1" onclick="openEditModal(${r.id})" title="Редактировать">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="openDeleteModal(${r.id}, '${escHtml(r.name).replace(/'/g,"\\'")}')">
                    <i class="bi bi-trash"></i>
                </button>` : ''}
            </td>
        </tr>`).join('');
}

function openCreateModal() {
    isEditMode = false;
    document.getElementById('itemForm').reset();
    document.getElementById('editItemId').value = '';
    document.getElementById('modalTitle').textContent = 'Новый регион';
    document.getElementById('modalSaveTxt').textContent = 'Создать';
    document.getElementById('activeField').style.display = 'none';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
}

async function openEditModal(id) {
    isEditMode = true;
    try {
        const items = await api.getRegions(true);
        const r = items.find(x => x.id === id);
        if (!r) { showToast('Регион не найден', 'danger'); return; }

        document.getElementById('itemForm').reset();
        document.getElementById('editItemId').value      = r.id;
        document.getElementById('modalTitle').textContent = `Редактировать: ${r.name}`;
        document.getElementById('modalSaveTxt').textContent = 'Сохранить';
        document.getElementById('f_name').value           = r.name;
        document.getElementById('f_is_active').checked    = r.is_active;
        document.getElementById('activeField').style.display = '';

        new bootstrap.Modal(document.getElementById('itemModal')).show();
    } catch (err) {
        showToast(err.message, 'danger');
    }
}

async function submitForm() {
    const form = document.getElementById('itemForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const data = { name: document.getElementById('f_name').value.trim() };

    try {
        if (!isEditMode) {
            await api.createRegion(data);
            showToast('Регион добавлен');
        } else {
            const id = document.getElementById('editItemId').value;
            data.is_active = document.getElementById('f_is_active').checked;
            await api.updateRegion(id, data);
            showToast('Регион обновлён');
        }
        bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();
        loadItems();
    } catch (err) {
        showToast(err.message, 'danger');
    }
}

function openDeleteModal(id, name) {
    deleteItemId = id;
    document.getElementById('deleteTargetName').textContent = name;
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
}

async function confirmDelete() {
    try {
        await api.deleteRegion(deleteItemId);
        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
        showToast('Регион удалён');
        loadItems();
    } catch (err) {
        showToast(err.message, 'danger');
    }
}

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
