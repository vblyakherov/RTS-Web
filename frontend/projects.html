<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTKS Tracker — Крупные проекты</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1100;margin-top:60px;"></div>

<div class="page-content">
    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <div>
            <h5 class="mb-1 fw-bold"><i class="bi bi-kanban me-2"></i>Крупные проекты</h5>
            <div class="small text-muted">Управление верхнеуровневыми проектами и их архитектурными параметрами.</div>
        </div>
        <button class="btn btn-primary btn-sm" id="btnAddProject" type="button">
            <i class="bi bi-plus-lg me-1"></i>Добавить проект
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">Проект</th>
                            <th>Модуль</th>
                            <th>Шаблон</th>
                            <th>Объекты</th>
                            <th>Доступы</th>
                            <th>Статус</th>
                            <th style="width:90px;"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="text-center py-5">
                            <div class="spinner-border text-primary"></div>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="projectModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Новый проект</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="projectForm" novalidate>
                    <input type="hidden" id="editProjectId">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="f_name" required placeholder="Например: УЦН 2.0 2026 год">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Код <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="f_code" required placeholder="ucn-2026">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Внутренний модуль</label>
                            <select class="form-select" id="f_module_key">
                                <option value="placeholder">Архитектурный контейнер</option>
                                <option value="ucn_sites_v1">Модуль объектов УЦН</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ключ шаблона</label>
                            <input type="text" class="form-control" id="f_template_key" placeholder="Например: sync_template.xlsm">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Порядок</label>
                            <input type="number" class="form-control" id="f_sort_order" value="100">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Описание</label>
                            <textarea class="form-control" id="f_description" rows="3" placeholder="Кратко описать назначение проекта и текущее состояние"></textarea>
                        </div>
                        <div class="col-12" id="activeField" style="display:none;">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="f_is_active">
                                <label class="form-check-label" for="f_is_active">Активен</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="btnProjectSave">
                    <i class="bi bi-check-lg me-1"></i><span id="modalSaveTxt">Создать</span>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title text-danger">
                    <i class="bi bi-kanban me-2"></i>Удалить проект?
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Проект <strong id="deleteTargetName"></strong> будет удалён.
                Проекты с объектами удалить нельзя.
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-danger" id="btnProjectDeleteConfirm">
                    <i class="bi bi-trash me-1"></i>Удалить
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
let currentUser = null;
let projects = [];
let isEditMode = false;
let deleteProjectId = null;
const PROJECTS_PAGE_FLASH_KEY = 'projects_page_flash';

async function init() {
    currentUser = await checkAuth();
    if (!currentUser) return;
    if (currentUser.role !== 'admin') {
        window.location.href = '/index.html';
        return;
    }

    mountNavbar(currentUser, 'projects');
    bindAppModalDismissals(document);
    consumePageFlash(PROJECTS_PAGE_FLASH_KEY);
    document.getElementById('btnAddProject').addEventListener('click', openCreateModal);
    document.getElementById('btnProjectSave').addEventListener('click', submitForm);
    document.getElementById('btnProjectDeleteConfirm').addEventListener('click', confirmDelete);
    loadProjects();
}

async function loadProjects() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5">
        <div class="spinner-border text-primary"></div></td></tr>`;
    try {
        projects = await api.getProjects(false);
        renderTable();
    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">
            <i class="bi bi-exclamation-triangle me-2"></i>${escHtml(err.message)}</td></tr>`;
    }
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (!projects.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-5">
            <i class="bi bi-kanban display-6 d-block mb-2"></i>Проекты не найдены</td></tr>`;
        return;
    }

    tbody.innerHTML = projects.map(project => `
        <tr>
            <td class="ps-3">
                <div class="fw-semibold">${escHtml(project.name)}</div>
                <div class="small text-muted">${escHtml(project.code)}</div>
            </td>
            <td class="small">${escHtml(moduleLabel(project.module_key))}</td>
            <td class="small">${escHtml(project.template_key || '—')}</td>
            <td class="small">${project.site_count || 0}</td>
            <td class="small">${project.assigned_user_count || 0}</td>
            <td>
                ${project.is_active
                    ? '<span class="badge bg-success-subtle text-success border border-success-subtle">Активен</span>'
                    : '<span class="badge bg-secondary-subtle text-secondary border">Неактивен</span>'}
            </td>
            <td>
                <button type="button"
                        class="btn btn-sm btn-outline-secondary py-0 px-1 me-1"
                        data-project-action="edit"
                        data-project-id="${project.id}"
                        title="Редактировать">
                    <i class="bi bi-pencil"></i>
                </button>
                <button type="button"
                        class="btn btn-sm btn-outline-danger py-0 px-1"
                        data-project-action="delete"
                        data-project-id="${project.id}"
                        title="${project.site_count ? 'Проект с объектами удалить нельзя' : 'Удалить'}"
                        ${project.site_count ? 'disabled' : ''}>
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
    bindProjectRowActions(tbody);
}

function bindProjectRowActions(scope) {
    scope.querySelectorAll('[data-project-action]').forEach(button => {
        if (button.dataset.projectActionBound === 'true') return;
        button.dataset.projectActionBound = 'true';
        button.addEventListener('click', event => {
            event.preventDefault();
            const projectId = Number(button.dataset.projectId);
            if (!projectId) return;

            if (button.dataset.projectAction === 'edit') {
                openEditModal(projectId);
                return;
            }

            if (button.dataset.projectAction === 'delete') {
                openDeleteModal(projectId);
            }
        });
    });
}

function openCreateModal() {
    if (!showAppModal('projectModal')) {
        showToast('Не удалось открыть форму проекта', 'danger');
        return;
    }
    isEditMode = false;
    document.getElementById('projectForm').reset();
    document.getElementById('editProjectId').value = '';
    document.getElementById('modalTitle').textContent = 'Новый проект';
    document.getElementById('modalSaveTxt').textContent = 'Создать';
    document.getElementById('f_module_key').value = 'placeholder';
    document.getElementById('f_sort_order').value = 100;
    document.getElementById('f_template_key').value = '';
    document.getElementById('f_description').value = '';
    document.getElementById('f_is_active').checked = true;
    document.getElementById('activeField').style.display = 'none';
}

function openEditModal(id) {
    if (!showAppModal('projectModal')) {
        showToast('Не удалось открыть форму проекта', 'danger');
        return;
    }
    const project = projects.find(item => item.id === id);
    if (!project) {
        showToast('Проект не найден', 'danger');
        return;
    }

    isEditMode = true;
    document.getElementById('projectForm').reset();
    document.getElementById('editProjectId').value = project.id;
    document.getElementById('modalTitle').textContent = `Редактировать: ${project.name}`;
    document.getElementById('modalSaveTxt').textContent = 'Сохранить';
    document.getElementById('f_name').value = project.name;
    document.getElementById('f_code').value = project.code;
    document.getElementById('f_description').value = project.description || '';
    document.getElementById('f_module_key').value = project.module_key;
    document.getElementById('f_template_key').value = project.template_key || '';
    document.getElementById('f_sort_order').value = project.sort_order || 100;
    document.getElementById('f_is_active').checked = project.is_active;
    document.getElementById('activeField').style.display = '';
}

async function submitForm() {
    const form = document.getElementById('projectForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const data = {
        name: document.getElementById('f_name').value.trim(),
        code: document.getElementById('f_code').value.trim(),
        description: document.getElementById('f_description').value.trim() || null,
        module_key: document.getElementById('f_module_key').value,
        template_key: document.getElementById('f_template_key').value.trim() || null,
        sort_order: parseInt(document.getElementById('f_sort_order').value || '100', 10),
    };

    try {
        if (!isEditMode) {
            await api.createProject(data);
            setPageFlash(PROJECTS_PAGE_FLASH_KEY, 'Проект добавлен');
        } else {
            data.is_active = document.getElementById('f_is_active').checked;
            const projectId = document.getElementById('editProjectId').value;
            await api.updateProject(projectId, data);
            setPageFlash(PROJECTS_PAGE_FLASH_KEY, 'Проект обновлён');
        }
        window.location.replace(window.location.pathname + window.location.search);
    } catch (err) {
        showToast(err.message, 'danger');
    }
}

function openDeleteModal(id) {
    if (!showAppModal('deleteModal')) {
        showToast('Не удалось открыть подтверждение удаления', 'danger');
        return;
    }
    const project = projects.find(item => item.id === id);
    if (!project) {
        showToast('Проект не найден', 'danger');
        return;
    }

    deleteProjectId = id;
    document.getElementById('deleteTargetName').textContent = project.name;
}

async function confirmDelete() {
    if (!deleteProjectId) return;
    try {
        await api.deleteProject(deleteProjectId);
        setPageFlash(PROJECTS_PAGE_FLASH_KEY, 'Проект удалён');
        window.location.replace(window.location.pathname + window.location.search);
    } catch (err) {
        showToast(err.message, 'danger');
    }
}

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

init();
</script>
</body>
</html>
