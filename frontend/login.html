<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTKS Tracker — Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page d-flex align-items-center justify-content-center">
    <div style="width:100%;max-width:400px;padding:1rem;">
        <div class="card login-card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <i class="bi bi-broadcast-pin" style="font-size:3rem;color:#0d6efd;"></i>
                    </div>
                    <h4 class="fw-bold mb-1">RTKS Tracker</h4>
                    <p class="text-muted small mb-0">Система трекинга строительства объектов сети</p>
                </div>

                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Логин</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                name="username"
                                placeholder="Введите логин"
                                required
                                autofocus
                                autocomplete="username"
                            >
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                name="password"
                                placeholder="Введите пароль"
                                required
                                autocomplete="current-password"
                            >
                        </div>
                    </div>

                    <div id="loginError" class="alert alert-danger py-2 d-none" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <span id="loginErrorText"></span>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mt-2" id="loginBtn">
                        <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
                        <span id="loginBtnText">Войти</span>
                    </button>
                </form>
            </div>
        </div>
        <p class="text-center text-white-50 small mt-3">РТК Сервис &copy; 2025</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        // Already logged in → redirect
        if (api.getToken()) {
            window.location.href = '/index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn     = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const errEl   = document.getElementById('loginError');
            const errText = document.getElementById('loginErrorText');

            btn.disabled = true;
            spinner.classList.remove('d-none');
            errEl.classList.add('d-none');

            try {
                const data = await api.login(
                    document.getElementById('username').value.trim(),
                    document.getElementById('password').value,
                );
                api.setToken(data.access_token);
                window.location.href = '/index.html';
            } catch (err) {
                errText.textContent = err.message;
                errEl.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
