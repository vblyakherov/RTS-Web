<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTKS Tracker — Мой профиль</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1100;margin-top:60px;"></div>

<div class="page-content">
    <div class="row g-3">
        <div class="col-12 col-xl-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-3">
                        <div>
                            <h5 class="mb-1 fw-bold"><i class="bi bi-person-gear me-2"></i>Мой профиль</h5>
                            <div class="small text-muted">
                                Здесь можно изменить свой логин и при необходимости задать новый пароль.
                            </div>
                        </div>
                        <span id="profileRoleBadge"></span>
                    </div>

                    <form id="profileForm" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="profileUsername">Логин <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="profileUsername" required minlength="3" autocomplete="username">
                                <div class="invalid-feedback">Логин обязателен (мин. 3 символа).</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="profileEmail">Email</label>
                                <input type="email" class="form-control" id="profileEmail" readonly>
                                <div class="form-text">Email и роль меняются через админский контур.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="profilePassword">Новый пароль</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="profilePassword" minlength="8" placeholder="Оставьте пустым, чтобы не менять" autocomplete="new-password">
                                    <button type="button" class="btn btn-outline-secondary" onclick="toggleProfilePassword('profilePassword', 'profilePasswordEye')">
                                        <i class="bi bi-eye" id="profilePasswordEye"></i>
                                    </button>
                                </div>
                                <div class="form-text">Минимум 8 символов.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" for="profilePasswordConfirm">Повторите новый пароль</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="profilePasswordConfirm" minlength="8" placeholder="Повторите новый пароль" autocomplete="new-password">
                                    <button type="button" class="btn btn-outline-secondary" onclick="toggleProfilePassword('profilePasswordConfirm', 'profilePasswordConfirmEye')">
                                        <i class="bi bi-eye" id="profilePasswordConfirmEye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary" id="profileSaveBtn">
                                    <i class="bi bi-check-lg me-1"></i>Сохранить изменения
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-xl-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <div class="small text-uppercase text-muted fw-semibold mb-2">Текущий профиль</div>
                    <div class="mb-3">
                        <div class="text-muted small">Логин</div>
                        <div class="fw-semibold" id="profileUsernameText">—</div>
                    </div>
                    <div class="mb-3">
                        <div class="text-muted small">Полное имя</div>
                        <div id="profileFullNameText">—</div>
                    </div>
                    <div class="mb-3">
                        <div class="text-muted small">Роль</div>
                        <div id="profileRoleText">—</div>
                    </div>
                    <div>
                        <div class="text-muted small">Email</div>
                        <div id="profileEmailText">—</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
let currentUser = null;

async function init() {
    currentUser = await checkAuth();
    if (!currentUser) return;

    renderPage();
    document.getElementById('profileForm').addEventListener('submit', submitProfileForm);
}

function renderPage() {
    mountNavbar(currentUser, 'profile');
    document.getElementById('profileRoleBadge').innerHTML = roleBadge(currentUser.role);
    document.getElementById('profileUsernameText').textContent = currentUser.username || '—';
    document.getElementById('profileFullNameText').textContent = currentUser.full_name || '—';
    document.getElementById('profileRoleText').textContent = ROLE_LABELS[currentUser.role] || currentUser.role;
    document.getElementById('profileEmailText').textContent = currentUser.email || '—';

    document.getElementById('profileUsername').value = currentUser.username || '';
    document.getElementById('profileEmail').value = currentUser.email || '';
    document.getElementById('profilePassword').value = '';
    document.getElementById('profilePasswordConfirm').value = '';
}

function toggleProfilePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

async function submitProfileForm(event) {
    event.preventDefault();

    const form = document.getElementById('profileForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    const username = document.getElementById('profileUsername').value.trim();
    const password = document.getElementById('profilePassword').value;
    const passwordConfirm = document.getElementById('profilePasswordConfirm').value;

    if (password !== passwordConfirm) {
        showToast('Новый пароль и подтверждение не совпадают', 'danger');
        return;
    }

    const payload = {};
    if (username !== currentUser.username) {
        payload.username = username;
    }
    if (password) {
        payload.password = password;
    }

    if (!Object.keys(payload).length) {
        showToast('Изменений нет', 'info');
        return;
    }

    const saveBtn = document.getElementById('profileSaveBtn');
    saveBtn.disabled = true;

    try {
        const updatedUser = await api.updateMe(payload);
        currentUser = updatedUser;
        api.setUser(updatedUser);
        renderPage();
        showToast('Профиль обновлён');
    } catch (err) {
        showToast(err.message, 'danger');
    } finally {
        saveBtn.disabled = false;
    }
}

init();
</script>
</body>
</html>
