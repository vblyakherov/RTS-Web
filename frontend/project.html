<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTKS Tracker — Проект</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1100;margin-top:60px;"></div>

<div class="page-content">
    <a href="/index.html" class="btn btn-sm btn-outline-secondary mb-3">
        <i class="bi bi-arrow-left me-1"></i>К выбору проектов
    </a>

    <div id="projectShell">
        <div class="card shadow-sm">
            <div class="card-body text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
let currentUser = null;
let currentProject = null;

async function init() {
    currentUser = await checkAuth();
    if (!currentUser) return;

    const projectId = new URLSearchParams(window.location.search).get('id');
    if (!projectId) {
        window.location.href = '/index.html';
        return;
    }

    try {
        currentProject = await api.getProject(projectId);
    } catch (err) {
        showToast(err.message, 'danger');
        window.location.href = '/index.html';
        return;
    }

    rememberProject(currentProject);

    if (currentProject.module_key === 'ucn_sites_v1') {
        window.location.href = getProjectRoute(currentProject);
        return;
    }

    mountNavbar(currentUser, 'project');
    renderProject();
}

function renderProject() {
    document.title = `${currentProject.name} — RTKS Tracker`;
    document.getElementById('projectShell').innerHTML = `
        <div class="card shadow-sm project-shell-card">
            <div class="card-body p-4 p-lg-5">
                <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-4">
                    <div>
                        <div class="small text-uppercase text-muted fw-semibold mb-1">${escHtml(currentProject.code)}</div>
                        <h1 class="h3 fw-bold mb-2">${escHtml(currentProject.name)}</h1>
                        <p class="text-muted mb-0">${escHtml(currentProject.description || 'Описание проекта пока не заполнено.')}</p>
                    </div>
                    <span class="badge bg-secondary-subtle text-secondary border">Архитектурный задел</span>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="project-info-card">
                            <div class="small text-muted mb-1">Модуль</div>
                            <div class="fw-semibold">${escHtml(moduleLabel(currentProject.module_key))}</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="project-info-card">
                            <div class="small text-muted mb-1">Шаблон</div>
                            <div class="fw-semibold">${escHtml(currentProject.template_key || 'Пока не задан')}</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="project-info-card">
                            <div class="small text-muted mb-1">Статус</div>
                            <div class="fw-semibold">${currentProject.is_active ? 'Активен' : 'Неактивен'}</div>
                        </div>
                    </div>
                </div>

                <div class="alert alert-light border mb-0">
                    <div class="fw-semibold mb-2">Внутренний модуль проекта пока не настроен.</div>
                    Сейчас проект существует как верхнеуровневый контейнер: доступны выбор проекта, права доступа и админское управление.
                    Когда будет определён формат данных и шаблонов для этого направления, сюда можно будет подключить отдельный UI и отдельные файлы/экспорт.
                </div>
            </div>
        </div>`;
}

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

init();
</script>
</body>
</html>
