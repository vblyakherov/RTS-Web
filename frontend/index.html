<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTKS Tracker — Проекты</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1100;margin-top:60px;"></div>

<div class="page-content">
    <div class="project-hero mb-4">
        <div>
            <div class="project-hero-kicker">Крупные направления</div>
            <h1 class="project-hero-title">Выберите проект</h1>
            <p class="project-hero-subtitle mb-0">
                Вход в рабочее пространство теперь начинается с выбора крупного проекта.
            </p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-primary d-none" id="manageProjectsBtn" onclick="window.location.href='/projects.html'">
                <i class="bi bi-sliders me-1"></i>Управление проектами
            </button>
        </div>
    </div>

    <div id="projectsState" class="row g-3">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body text-center py-5">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
let currentUser = null;

async function init() {
    currentUser = await checkAuth();
    if (!currentUser) return;

    api.clearCurrentProject();
    mountNavbar(currentUser, 'index');

    if (currentUser.role === 'admin') {
        document.getElementById('manageProjectsBtn').classList.remove('d-none');
    }

    loadProjects();
}

async function loadProjects() {
    const container = document.getElementById('projectsState');
    container.innerHTML = `
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body text-center py-5">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
        </div>`;

    try {
        const projects = await api.getProjects(true);
        renderProjects(projects);
    } catch (err) {
        container.innerHTML = `
            <div class="col-12">
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i>${escHtml(err.message)}
                </div>
            </div>`;
    }
}

function renderProjects(projects) {
    const container = document.getElementById('projectsState');
    if (!projects.length) {
        container.innerHTML = `
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body text-center py-5 text-muted">
                        <i class="bi bi-grid display-6 d-block mb-3"></i>
                        Доступных проектов пока нет.
                    </div>
                </div>
            </div>`;
        return;
    }

    container.innerHTML = projects.map(project => `
        <div class="col-12 col-md-6 col-xl-4">
            <button class="project-tile card shadow-sm h-100 ${project.is_configured ? 'project-tile-ready' : 'project-tile-placeholder'}"
                    onclick='openProject(${JSON.stringify(project).replace(/'/g, "&apos;")})'>
                <div class="card-body d-flex flex-column text-start">
                    <div class="d-flex justify-content-between align-items-start gap-2 mb-3">
                        <div>
                            <div class="small text-uppercase text-muted fw-semibold mb-1">${escHtml(project.code)}</div>
                            <h5 class="mb-0 fw-bold">${escHtml(project.name)}</h5>
                        </div>
                        <span class="badge ${project.is_configured ? 'bg-success-subtle text-success border border-success-subtle' : 'bg-secondary-subtle text-secondary border'}">
                            ${project.is_configured ? 'Готово' : 'Задел'}
                        </span>
                    </div>
                    <p class="text-muted small flex-grow-1 mb-3">${escHtml(project.description || 'Описание проекта пока не заполнено.')}</p>
                    <div class="project-tile-meta">
                        <span><i class="bi bi-box me-1"></i>${escHtml(moduleLabel(project.module_key))}</span>
                        <span><i class="bi bi-diagram-3 me-1"></i>${project.site_count || 0} объектов</span>
                        <span><i class="bi bi-people me-1"></i>${project.assigned_user_count || 0} назначений</span>
                    </div>
                </div>
            </button>
        </div>
    `).join('');
}

function openProject(project) {
    rememberProject(project);
    window.location.href = getProjectRoute(project);
}

init();
</script>
</body>
</html>
